<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Любишь меня?</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ffe6f0, #ffe);
  }

  h1 {
    position: absolute;
    top: 40px;
    width: 100%;
    text-align: center;
    font-size: 2.2rem;
    color: #ff4d88;
  }

  .btn {
    position: absolute;
    padding: 18px 40px;
    font-size: 18px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: top 0.25s ease, left 0.25s ease, transform 0.2s;
    user-select: none;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  }

  #yes {
    background: #ff4d88;
    color: white;
  }

  #no {
    background: white;
    color: #ff4d88;
    border: 2px solid #ff4d88;
  }

  #message {
    position: absolute;
    top: 30%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 2rem;
    color: #ff4d88;
    display: none;
    text-align: center;
  }

  .heart {
    position: absolute;
    color: #ff4d88;
    font-size: 20px;
    animation: floatUp 1.5s linear forwards;
  }

  @keyframes floatUp {
    0% {
      transform: translateY(0) scale(1);
      opacity: 1;
    }
    100% {
      transform: translateY(-150px) scale(1.5);
      opacity: 0;
    }
  }
</style>
</head>

<body>

<h1>Любишь меня? 💖</h1>

<button id="yes" class="btn">Да</button>
<button id="no" class="btn">Нет</button>

<div id="message"></div>

<script>
const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");
const message = document.getElementById("message");

function moveNoButton() {
  const padding = 20;
  const maxX = window.innerWidth - noBtn.offsetWidth - padding;
  const maxY = window.innerHeight - noBtn.offsetHeight - padding;

  const x = Math.random() * maxX;
  const y = Math.random() * maxY;

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

noBtn.addEventListener("mouseenter", moveNoButton);
noBtn.addEventListener("click", moveNoButton);

// стартовые позиции
function centerButtons() {
  yesBtn.style.left = (window.innerWidth / 2 - 120) + "px";
  yesBtn.style.top = (window.innerHeight / 2) + "px";

  noBtn.style.left = (window.innerWidth / 2 + 20) + "px";
  noBtn.style.top = (window.innerHeight / 2) + "px";
}

centerButtons();
window.addEventListener("resize", centerButtons);

function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerText = "💖";

  heart.style.left = Math.random() * window.innerWidth + "px";
  heart.style.top = window.innerHeight + "px";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 1500);
}

yesBtn.addEventListener("click", () => {
  message.style.display = "block";
  message.innerHTML = "Я знал ❤️ <br/>Ты сделала меня счастливым 💖";

  for (let i = 0; i < 30; i++) {
    setTimeout(createHeart, i * 50);
  }
});
</script>

</body>
</html>
