<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Собери любовь 💖</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    height: 100vh;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #ffe6f0, #fff);
  }

  #game {
    position: relative;
    width: 100%;
    height: 100%;
  }

  #player {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 40px;
    transition: left 0.05s linear;
  }

  .heart {
    position: absolute;
    font-size: 24px;
    animation: fall linear;
  }

  @keyframes fall {
    from { transform: translateY(-50px); }
    to { transform: translateY(110vh); }
  }

  #score {
    position: absolute;
    top: 20px;
    left: 20px;
    font-size: 18px;
    color: #ff4d88;
  }

  #letter {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    text-align: center;
    padding: 40px;
  }

  .card {
    max-width: 500px;
    background: white;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.1);
    animation: pop 0.6s ease;
  }

  h1 {
    color: #ff4d88;
  }

  @keyframes pop {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
</style>
</head>

<body>

<div id="game">
  <div id="score">Сердца: 0 / 10 💖</div>
  <div id="player">💌</div>

  <div id="letter">
    <div class="card">
      <h1>Ты собрала всю любовь 💖</h1>
      <p>
        Я не знаю, как ты это сделала…<br><br>
        Но, похоже, ты собрала все мои чувства в одном месте.<br><br>
        И да… ты мне очень нравишься 💕
      </p>
    </div>
  </div>
</div>

<script>
const game = document.getElementById("game");
const player = document.getElementById("player");
const scoreEl = document.getElementById("score");
const letter = document.getElementById("letter");

let score = 0;

// управление (мышь / тап)
document.addEventListener("mousemove", (e) => {
  player.style.left = e.clientX + "px";
});

document.addEventListener("touchmove", (e) => {
  player.style.left = e.touches[0].clientX + "px";
});

// создание сердец
function spawnHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerText = "💖";

  const x = Math.random() * window.innerWidth;
  heart.style.left = x + "px";
  heart.style.top = "-50px";

  const duration = 3 + Math.random() * 2;
  heart.style.animationDuration = duration + "s";

  game.appendChild(heart);

  const fallInterval = setInterval(() => {
    const heartRect = heart.getBoundingClientRect();
    const playerRect = player.getBoundingClientRect();

    if (
      heartRect.bottom >= playerRect.top &&
      heartRect.left < playerRect.right &&
      heartRect.right > playerRect.left
    ) {
      heart.remove();
      clearInterval(fallInterval);

      score++;
      scoreEl.innerText = `Сердца: ${score} / 10 💖`;

      if (score >= 10) {
        letter.style.display = "flex";
      }
    }
  }, 50);

  setTimeout(() => {
    heart.remove();
    clearInterval(fallInterval);
  }, duration * 1000);
}

setInterval(spawnHeart, 600);
</script>

</body>
</html>
